<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard – Hotel New Kishan</title>
    <link rel="stylesheet" href="css/admin.css" />
</head>

<body>

    <!-- ══ LOGIN ══════════════════════════════════════════════ -->
    <div class="login-screen" id="login-screen">
        <div class="login-card">
            <div class="login-logo">🏨</div>
            <h1 class="login-hotel-name">Hotel New Kishan</h1>
            <p class="login-subtitle">Owner Panel – Mr. Kuldip Khairnar</p>
            <div class="form-group">
                <label class="form-label">Admin Password</label>
                <input type="password" id="admin-pwd" class="form-input" placeholder="Enter password" />
            </div>
            <button class="btn-login" onclick="adminLogin()">🔐 Login to Dashboard</button>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <!-- ══ DASHBOARD ══════════════════════════════════════════ -->
    <div class="hidden" id="dashboard">

        <div class="admin-header">
            <div class="admin-logo">
                <div class="admin-logo-icon">🏨</div>
                <div class="admin-logo-text">
                    <h1>Hotel New Kishan</h1>
                    <p id="owner-name-display">Owner: Mr. Kuldip Khairnar</p>
                </div>
            </div>
            <div style="display:flex;gap:12px;align-items:center;">
                <a href="/" style="color:var(--gold-dark);font-size:13px;text-decoration:none;">🌐 View Menu</a>
                <button class="btn-logout" onclick="adminLogout()">Logout →</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="admin-tabs">
            <button class="admin-tab-btn active" id="tab-orders" onclick="loadTab('orders')">
                📋 Live Orders <span class="orders-badge" id="orders-badge" style="display:none">0</span>
            </button>
            <button class="admin-tab-btn" id="tab-history" onclick="loadTab('history')">🕐 History</button>
            <button class="admin-tab-btn" id="tab-menu" onclick="loadTab('menu')">🍽️ Menu</button>
            <button class="admin-tab-btn" id="tab-settings" onclick="loadTab('settings')">⚙️ Settings</button>
        </div>

        <!-- ── Live Orders Panel ──────────────────────────────── -->
        <div class="admin-panel" id="panel-orders">
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-number" id="stat-pending">–</div>
                    <div class="stat-label">Received</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-preparing">–</div>
                    <div class="stat-label">Preparing</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-done">–</div>
                    <div class="stat-label">Done Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-revenue">–</div>
                    <div class="stat-label">Today's Revenue</div>
                </div>
            </div>
            <div class="panel-header">
                <h2 class="panel-title">Live Orders</h2>
                <button onclick="renderOrders()"
                    style="background:none;border:1px solid var(--border);color:var(--text-muted);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;">🔄
                    Refresh</button>
            </div>
            <div class="orders-grid" id="orders-container">
                <div class="empty-state">
                    <div class="empty-icon">🕐</div>
                    <p>Loading...</p>
                </div>
            </div>
        </div>

        <!-- ── History Panel ──────────────────────────────────── -->
        <div class="admin-panel hidden" id="panel-history">
            <div class="panel-header">
                <h2 class="panel-title">Order History</h2>
                <button class="btn-del-order" onclick="clearHistory()">🗑️ Clear All</button>
            </div>
            <div id="history-container"></div>
        </div>

        <!-- ── Menu Manager Panel ─────────────────────────────── -->
        <div class="admin-panel hidden" id="panel-menu">
            <div class="panel-header">
                <h2 class="panel-title">Menu Manager</h2>
            </div>
            <div class="menu-type-tabs">
                <button class="menu-type-btn active" id="menu-veg-btn" onclick="switchMenuType('veg')">🟢 Veg</button>
                <button class="menu-type-btn" id="menu-nonveg-btn" onclick="switchMenuType('nonveg')">🔴
                    Non-Veg</button>
            </div>
            <div id="veg-menu-section">
                <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
                    <button class="btn-add-item" onclick="openAddItem('veg')">+ Add Veg Item</button>
                </div>
                <div id="veg-menu-container"></div>
            </div>
            <div id="nonveg-menu-section" class="hidden">
                <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
                    <button class="btn-add-item" onclick="openAddItem('nonveg')">+ Add Non-Veg Item</button>
                </div>
                <div id="nonveg-menu-container"></div>
            </div>
        </div>

        <!-- ── Settings Panel ─────────────────────────────────── -->
        <div class="admin-panel hidden" id="panel-settings">
            <h2 class="panel-title" style="margin-bottom:24px;">Settings</h2>

            <!-- Hotel Info -->
            <div class="settings-card">
                <h3>🏨 Hotel Information</h3>
                <div class="form-group">
                    <label class="form-label">Hotel Address</label>
                    <input type="text" id="set-address" class="form-input" placeholder="Full hotel address" />
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="text" id="set-phone" class="form-input" placeholder="Contact number" />
                </div>
                <div class="form-group">
                    <label class="form-label">Owner Name</label>
                    <input type="text" id="set-owner" class="form-input" placeholder="Owner name" />
                </div>
                <div class="form-group">
                    <label class="form-label">UPI ID (For Online Payments)</label>
                    <input type="text" id="set-upi" class="form-input" placeholder="e.g. 9876543210@ybl" />
                </div>
                <button class="btn-save" onclick="saveHotelInfo()">💾 Save Hotel Info</button>
            </div>

            <!-- Change Password -->
            <div class="settings-card">
                <h3>🔐 Change Admin Password</h3>
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" id="pwd-current" class="form-input" placeholder="Current password" />
                </div>
                <div class="form-group">
                    <label class="form-label">New Password (min 6 characters)</label>
                    <input type="password" id="pwd-new" class="form-input" placeholder="New password" />
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" id="pwd-confirm" class="form-input" placeholder="Confirm password" />
                </div>
                <button class="btn-save" onclick="changePassword()">🔑 Update Password</button>
                <div id="pwd-msg" style="margin-top:10px;font-size:13px;"></div>
            </div>
        </div>

    </div><!-- /dashboard -->

    <!-- ══ ADD/EDIT ITEM MODAL ════════════════════════════════ -->
    <div class="modal-backdrop hidden" id="item-modal">
        <div class="modal-box">
            <h2 class="modal-title" id="item-modal-title">Add Item</h2>
            <input type="hidden" id="item-type" value="veg" />
            <div class="form-group"><label class="form-label">Item Name (English) *</label><input type="text"
                    id="item-name" class="form-input" placeholder="e.g. Paneer Tikka" /></div>
            <div class="form-group"><label class="form-label">Item Name (Hindi/Marathi)</label><input type="text"
                    id="item-namehi" class="form-input" placeholder="e.g. पनीर टिक्का" /></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group"><label class="form-label">Price (₹) *</label><input type="number"
                        id="item-price" class="form-input" placeholder="150" min="1" /></div>
                <div class="form-group"><label class="form-label">Emoji</label><input type="text" id="item-emoji"
                        class="form-input" placeholder="🍛" maxlength="4" /></div>
            </div>
            <div class="form-group">
                <label class="form-label">Category *</label>
                <input type="text" id="item-category" class="form-input" placeholder="e.g. Veg Starter"
                    list="cat-list" />
                <datalist id="cat-list">
                    <option value="Veg Starter" />
                    <option value="Nashta / Snacks" />
                    <option value="Veg Thali" />
                    <option value="Veg Chinese" />
                    <option value="Veg Main Course" />
                    <option value="Papad" />
                    <option value="Tea & Coffee" />
                    <option value="Roti / Bread" />
                    <option value="Egg House" />
                    <option value="Chicken Dish" />
                    <option value="Mutton Dish" />
                    <option value="Fish Dish" />
                    <option value="Biryani" />
                    <option value="Non-Veg Thali" />
                    <option value="Non-Veg Chinese" />
                </datalist>
            </div>
            <div class="form-group"><label class="form-label">Description</label><textarea id="item-desc"
                    class="form-input" rows="2" placeholder="Brief description..."></textarea></div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeItemModal()">Cancel</button>
                <button class="btn-primary" onclick="saveItem()">💾 Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
