version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: nk_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: nk_backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/hotel_new_kishan
      - JWT_SECRET=HotelNewKishanSecret2024KuldipKhairnar
      - PORT=5000
      - NODE_ENV=production
      - OWNER_SECRET_CODE=NEWKISHAN2024
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: nk_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
